<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fatec Zona Sul - FATMA AI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true"></div>

    <!-- Botão para abrir/fechar o chatbot -->
    <button id="chat-toggle" class="chat-toggle" aria-label="Abrir assistente">
      💬
    </button>

    <!-- Widget do chatbot (inicialmente oculto) -->
    <aside id="chat-widget" class="chat-widget" aria-hidden="true">
      <header class="chat-widget-header">
        <div>
          <h2>FATMA</h2>
          <p>Assistente Acadêmica</p>
        </div>
        <button id="chat-close" class="chat-close" aria-label="Fechar">
          ✕
        </button>
      </header>

      <main id="chat-history" class="chat-history" aria-live="polite"></main>

      <form id="chat-form" class="chat-form">
        <input
          id="user-input"
          type="text"
          placeholder="Digite sua pergunta..."
          autocomplete="off"
          required
        />
        <button type="submit">Enviar</button>
      </form>
    </aside>

    <script src="./script.js"></script>
  </body>
</html>
